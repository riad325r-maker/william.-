<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineLingua - لوحة التحكم</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="dashboard">
        <!-- الشريط الجانبي -->
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-film"></i>
                <span>CineLingua</span>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="active">
                    <i class="fas fa-home"></i>
                    <span>الرئيسية</span>
                </a>
                <a href="#library">
                    <i class="fas fa-book"></i>
                    <span>المكتبة</span>
                </a>
                <a href="#challenges">
                    <i class="fas fa-trophy"></i>
                    <span>التحديات</span>
                </a>
                <a href="#words">
                    <i class="fas fa-bookmark"></i>
                    <span>كلماتي</span>
                </a>
                <a href="#achievements">
                    <i class="fas fa-medal"></i>
                    <span>الإنجازات</span>
                </a>
                <a href="#community">
                    <i class="fas fa-users"></i>
                    <span>المجتمع</span>
                </a>
                <a href="#settings">
                    <i class="fas fa-cog"></i>
                    <span>الإعدادات</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <img src="https://via.placeholder.com/40" alt="User">
                    <div>
                        <p>أحمد محمد</p>
                        <small>المستوى: متوسط</small>
                    </div>
                </div>
            </div>
        </aside>

        <!-- المحتوى الرئيسي -->
        <main class="main-content">
            <!-- شريط العلوي -->
            <header class="dashboard-header">
                <h1>مرحباً أحمد! 👋</h1>
                <div class="header-search">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="ابحث عن فيلم أو كلمة...">
                </div>
            </header>

            <!-- بطاقات التقدم -->
            <div class="progress-cards">
                <div class="progress-card">
                    <div class="card-icon blue">
                        <i class="fas fa-fire"></i>
                    </div>
                    <div class="card-info">
                        <h3>7 أيام</h3>
                        <p>Streak الحالي</p>
                    </div>
                </div>
                <div class="progress-card">
                    <div class="card-icon green">
                        <i class="fas fa-book"></i>
                    </div>
                    <div class="card-info">
                        <h3>120 كلمة</h3>
                        <p>كلمات محفوظة</p>
                    </div>
                </div>
                <div class="progress-card">
                    <div class="card-icon purple">
                        <i class="fas fa-video"></i>
                    </div>
                    <div class="card-info">
                        <h3>45 مشهد</h3>
                        <p>تمت مشاهدتها</p>
                    </div>
                </div>
                <div class="progress-card">
                    <div class="card-icon orange">
                        <i class="fas fa-medal"></i>
                    </div>
                    <div class="card-info">
                        <h3>5 شارات</h3>
                        <p>الإنجازات</p>
                    </div>
                </div>
            </div>

            <!-- متابعة المشاهدة -->
            <section class="continue-watching">
                <h2>أكمل المشاهدة</h2>
                <div class="continue-card">
                    <img src="https://via.placeholder.com/200x120" alt="Friends">
                    <div class="continue-info">
                        <h3>Friends - الموسم 1 | الحلقة 2</h3>
                        <p>تقدمك: 30%</p>
                        <div class="progress-bar">
                            <div class="progress" style="width: 30%"></div>
                        </div>
                        <button class="btn btn-primary" onclick="continueWatching()">
                            <i class="fas fa-play"></i> أكمل المشاهدة
                        </button>
                    </div>
                </div>
            </section>

            <!-- توصيات -->
            <section class="recommendations">
                <h2>اقتراحات لك</h2>
                <div class="movie-grid">
                    <!-- نفس بطاقات الأفلام من قبل -->
                </div>
            </section>
        </main>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
